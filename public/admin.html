<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - CyberGuard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <div class="logo-icon"><i data-lucide="shield-check"></i></div>
        <span>CyberGuard</span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Torna al sito</a>
        <a href="#" class="nav-link" id="logout-btn" style="display:none"><i data-lucide="log-out"></i> Logout</a>
      </nav>
    </div>
  </header>

  <section class="section" style="min-height:85vh; padding-top:8rem;">
    <div class="container">
      <!-- Login -->
      <div id="login-box" class="login-box">
        <div class="login-icon"><i data-lucide="lock"></i></div>
        <h2>Area riservata</h2>
        <p>Inserisci le credenziali per accedere al pannello admin</p>
        <form id="login-form">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="form-input" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-input" required autocomplete="current-password">
          </div>
          <div id="login-error" class="login-error"></div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Accedi</button>
        </form>
      </div>

      <!-- Admin Panel -->
      <div id="admin-panel" style="display:none">
        <div class="admin-header">
          <div>
            <span class="section-label">Pannello amministrativo</span>
            <h1 class="section-title">Gestione contenuti</h1>
          </div>
        </div>

        <div class="admin-grid">
          <!-- Form -->
          <div class="admin-form">
            <h3 id="form-title">Nuova news</h3>
            <form id="news-form">
              <input type="hidden" id="news-id">
              <div class="form-group">
                <label>Titolo</label>
                <input type="text" id="news-title" class="form-input" placeholder="Titolo della news" required>
              </div>
              <div class="form-group">
                <label>Contenuto</label>
                <textarea id="news-content" class="form-input" rows="8" placeholder="Scrivi il contenuto della news..." required></textarea>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submit-btn">Pubblica news</button>
                <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none">Annulla modifica</button>
              </div>
            </form>
          </div>

          <!-- List -->
          <div class="admin-list">
            <h3>News pubblicate</h3>
            <div id="news-list"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <style>
    .login-box {
      max-width: 420px;
      margin: 0 auto;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 3rem;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .login-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--blue-500), var(--blue-700));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      color: var(--white);
    }
    .login-icon svg { width: 32px; height: 32px; }
    .login-box h2 { font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--gray-900); }
    .login-box > p { color: var(--gray-500); margin-bottom: 2rem; }
    .login-error { color: var(--red); font-size: 0.9rem; min-height: 1.5rem; margin-bottom: 0.5rem; }

    .admin-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 2.5rem;
    }

    .admin-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
      align-items: start;
    }

    .admin-form {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 2rem;
      position: sticky; top: 100px;
    }
    .admin-form h3 { margin-bottom: 1.5rem; font-size: 1.25rem; color: var(--gray-900); }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
    }
    .btn-secondary:hover { background: var(--gray-200); }

    .admin-list { background: var(--gray-50); border-radius: var(--radius); padding: 1.5rem; }
    .admin-list h3 { margin-bottom: 1rem; font-size: 1.1rem; color: var(--gray-900); }

    .news-item {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .news-item:last-child { margin-bottom: 0; }
    .news-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.5rem; }
    .news-item h4 { font-size: 1rem; color: var(--gray-900); line-height: 1.4; }
    .news-item-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .news-item p { font-size: 0.85rem; color: var(--gray-500); line-height: 1.6; margin-bottom: 0.5rem; }
    .news-item small { font-size: 0.75rem; color: var(--gray-400); }

    .btn-icon {
      width: 36px; height: 36px;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
    }
    .btn-edit { background: var(--blue-50); color: var(--blue-600); border: 1px solid var(--blue-200); }
    .btn-edit:hover { background: var(--blue-100); }
    .btn-delete { background: #fee2e2; color: var(--red); border: 1px solid #fecaca; }
    .btn-delete:hover { background: #fecaca; }

    .empty-state {
      text-align: center; padding: 2rem; color: var(--gray-400);
    }

    @media (max-width: 900px) {
      .admin-grid { grid-template-columns: 1fr; }
      .admin-form { position: static; }
    }
  </style>

  <script>
    let loggedIn = false
    let editingId = null

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/check')
        const data = await res.json()
        loggedIn = data.loggedIn
        updateUI()
      } catch (err) {
        console.error('Errore auth:', err)
      }
    }

    function updateUI() {
      document.getElementById('login-box').style.display = loggedIn ? 'none' : 'block'
      document.getElementById('admin-panel').style.display = loggedIn ? 'block' : 'none'
      document.getElementById('logout-btn').style.display = loggedIn ? 'inline-flex' : 'none'
      if (loggedIn) loadNews()
      lucide.createIcons()
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault()
      const username = document.getElementById('username').value
      const password = document.getElementById('password').value
      const errorEl = document.getElementById('login-error')

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        const data = await res.json()
        if (data.ok) {
          loggedIn = true
          updateUI()
        } else {
          errorEl.textContent = 'Credenziali errate. Riprova.'
        }
      } catch (err) {
        errorEl.textContent = 'Errore di connessione'
      }
    })

    document.getElementById('logout-btn').addEventListener('click', async e => {
      e.preventDefault()
      await fetch('/api/logout', { method: 'POST' })
      loggedIn = false
      updateUI()
    })

    async function loadNews() {
      try {
        const res = await fetch('/api/news')
        const news = await res.json()
        const list = document.getElementById('news-list')

        if (news.length === 0) {
          list.innerHTML = '<div class="empty-state"><i data-lucide="inbox" style="width:48px;height:48px;margin-bottom:1rem;opacity:0.5"></i><p>Nessuna news pubblicata.<br>Usa il form per crearne una.</p></div>'
          lucide.createIcons()
        } else {
          list.innerHTML = news.map(n => `
            <div class="news-item" data-id="${n.id}">
              <div class="news-item-header">
                <h4>${escapeHtml(n.title)}</h4>
                <div class="news-item-actions">
                  <button class="btn btn-icon btn-edit" onclick="editNews(${n.id})" title="Modifica"><i data-lucide="pencil"></i></button>
                  <button class="btn btn-icon btn-delete" onclick="deleteNews(${n.id})" title="Elimina"><i data-lucide="trash-2"></i></button>
                </div>
              </div>
              <p>${escapeHtml(n.excerpt || '')}</p>
              <small>${new Date(n.created_at).toLocaleString('it-IT')}</small>
            </div>
          `).join('')
          lucide.createIcons()
        }
      } catch (err) {
        console.error('Errore caricamento news:', err)
      }
    }

    function escapeHtml(text) {
      if (!text) return ''
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    document.getElementById('news-form').addEventListener('submit', async e => {
      e.preventDefault()
      const id = document.getElementById('news-id').value
      const title = document.getElementById('news-title').value
      const content = document.getElementById('news-content').value

      try {
        const url = id ? `/api/admin/news/${id}` : '/api/admin/news'
        const method = id ? 'PUT' : 'POST'

        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content })
        })

        if (res.ok) {
          resetForm()
          loadNews()
        }
      } catch (err) {
        console.error('Errore salvataggio:', err)
      }
    })

    async function editNews(id) {
      try {
        const res = await fetch(`/api/news/${id}`)
        const news = await res.json()

        editingId = id
        document.getElementById('news-id').value = id
        document.getElementById('news-title').value = news.title
        document.getElementById('news-content').value = news.content
        document.getElementById('form-title').textContent = 'Modifica news'
        document.getElementById('submit-btn').textContent = 'Salva modifiche'
        document.getElementById('cancel-btn').style.display = 'inline-flex'

        document.querySelector('.admin-form').scrollIntoView({ behavior: 'smooth', block: 'start' })
      } catch (err) {
        console.error('Errore caricamento news:', err)
      }
    }

    function resetForm() {
      editingId = null
      document.getElementById('news-id').value = ''
      document.getElementById('news-title').value = ''
      document.getElementById('news-content').value = ''
      document.getElementById('form-title').textContent = 'Nuova news'
      document.getElementById('submit-btn').textContent = 'Pubblica news'
      document.getElementById('cancel-btn').style.display = 'none'
    }

    document.getElementById('cancel-btn').addEventListener('click', resetForm)

    async function deleteNews(id) {
      if (!confirm('Sei sicuro di voler eliminare questa news?')) return
      try {
        await fetch(`/api/admin/news/${id}`, { method: 'DELETE' })
        if (editingId === id) resetForm()
        loadNews()
      } catch (err) {
        console.error('Errore eliminazione:', err)
      }
    }

    document.addEventListener('DOMContentLoaded', checkAuth)
  </script>
</body>
</html>
