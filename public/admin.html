<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - CyberGuard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <div class="logo-icon"><i data-lucide="shield-check"></i></div>
        <span>CyberGuard</span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Torna al sito</a>
        <a href="#" class="nav-link" id="logout-btn" style="display:none">Logout</a>
      </nav>
    </div>
  </header>

  <section class="section" style="min-height:80vh; padding-top:8rem;">
    <div class="container">
      <!-- Login form -->
      <div id="login-box" class="login-box">
        <div class="login-icon"><i data-lucide="lock"></i></div>
        <h2>Area riservata</h2>
        <p>Inserisci le credenziali per accedere</p>
        <form id="login-form">
          <input type="text" placeholder="Username" id="username" class="form-input" required>
          <input type="password" placeholder="Password" id="password" class="form-input" required>
          <div id="login-error" class="login-error"></div>
          <button type="submit" class="btn btn-primary" style="width:100%">Accedi</button>
        </form>
      </div>

      <!-- Admin panel -->
      <div id="admin-panel" style="display:none">
        <div class="section-header">
          <h2 class="section-title">Pannello Admin</h2>
          <p class="section-desc">Gestisci le news del sito.</p>
        </div>

        <div class="admin-form">
          <h3>Nuova news</h3>
          <form id="news-form">
            <input type="text" placeholder="Titolo" id="news-title" class="form-input" required>
            <textarea placeholder="Contenuto" id="news-content" class="form-input" rows="4" required></textarea>
            <button type="submit" class="btn btn-primary">Pubblica</button>
          </form>
        </div>

        <div class="admin-list">
          <h3>News pubblicate</h3>
          <div id="news-list"></div>
        </div>
      </div>
    </div>
  </section>

  <style>
    .login-box {
      max-width: 400px;
      margin: 0 auto;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
    }
    .login-icon {
      width: 56px; height: 56px;
      background: var(--blue-100);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      color: var(--blue-600);
    }
    .login-icon svg { width: 28px; height: 28px; }
    .login-box h2 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--gray-900); }
    .login-box p { color: var(--gray-500); margin-bottom: 1.5rem; }
    #login-form { display: flex; flex-direction: column; gap: 0.75rem; }
    .login-error { color: var(--red); font-size: 0.875rem; min-height: 1.2rem; }
    .admin-form {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .admin-form h3 { margin-bottom: 1rem; font-size: 1.1rem; }
    #news-form { display: flex; flex-direction: column; gap: 0.75rem; }
    .admin-list h3 { margin-bottom: 1rem; font-size: 1.1rem; }
    .news-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 1rem; background: var(--gray-50); border-radius: var(--radius-sm);
      margin-bottom: 0.75rem; gap: 1rem;
    }
    .news-item-content h4 { font-size: 1rem; margin-bottom: 0.25rem; }
    .news-item-content p { font-size: 0.875rem; color: var(--gray-500); }
    .news-item-content small { color: var(--gray-400); font-size: 0.75rem; }
    .btn-delete {
      background: var(--red); color: white; border: none;
      padding: 0.4rem 0.75rem; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 0.8rem; font-weight: 500;
    }
  </style>

  <script>
    let loggedIn = false

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/check')
        const data = await res.json()
        loggedIn = data.loggedIn
        updateUI()
      } catch (err) {
        console.error('Errore auth:', err)
      }
    }

    function updateUI() {
      document.getElementById('login-box').style.display = loggedIn ? 'none' : 'block'
      document.getElementById('admin-panel').style.display = loggedIn ? 'block' : 'none'
      document.getElementById('logout-btn').style.display = loggedIn ? 'inline' : 'none'
      if (loggedIn) loadNews()
      if (typeof lucide !== 'undefined') lucide.createIcons()
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault()
      const username = document.getElementById('username').value
      const password = document.getElementById('password').value
      const errorEl = document.getElementById('login-error')

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        const data = await res.json()
        if (data.ok) {
          loggedIn = true
          updateUI()
        } else {
          errorEl.textContent = 'Credenziali errate'
        }
      } catch (err) {
        errorEl.textContent = 'Errore di connessione'
      }
    })

    document.getElementById('logout-btn').addEventListener('click', async e => {
      e.preventDefault()
      await fetch('/api/logout', { method: 'POST' })
      loggedIn = false
      updateUI()
    })

    async function loadNews() {
      try {
        const res = await fetch('/api/news')
        const news = await res.json()
        const list = document.getElementById('news-list')
        if (news.length === 0) {
          list.innerHTML = '<p style="color:var(--gray-400)">Nessuna news pubblicata.</p>'
        } else {
          list.innerHTML = news.map(n => `
            <div class="news-item">
              <div class="news-item-content">
                <h4>${escapeHtml(n.title)}</h4>
                <p>${escapeHtml(n.content)}</p>
                <small>${new Date(n.created_at).toLocaleString('it-IT')}</small>
              </div>
              <button class="btn-delete" data-id="${n.id}">Elimina</button>
            </div>
          `).join('')
          list.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', () => deleteNews(btn.dataset.id))
          })
        }
      } catch (err) {
        console.error('Errore caricamento news:', err)
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    document.getElementById('news-form').addEventListener('submit', async e => {
      e.preventDefault()
      const title = document.getElementById('news-title').value
      const content = document.getElementById('news-content').value

      try {
        const res = await fetch('/api/admin/news', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content })
        })
        if (res.ok) {
          document.getElementById('news-title').value = ''
          document.getElementById('news-content').value = ''
          loadNews()
        }
      } catch (err) {
        console.error('Errore pubblicazione:', err)
      }
    })

    async function deleteNews(id) {
      if (!confirm('Eliminare questa news?')) return
      try {
        await fetch(`/api/admin/news/${id}`, { method: 'DELETE' })
        loadNews()
      } catch (err) {
        console.error('Errore eliminazione:', err)
      }
    }

    document.addEventListener('DOMContentLoaded', checkAuth)
  </script>
</body>
</html>
