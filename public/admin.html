<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CyberGuard</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body style="padding-top:80px">
  <header class="header" style="background:var(--bg-alt)">
    <div class="wrap header-inner">
      <a href="/" class="logo">
        <div class="logo-icon"></div>
        <span>CyberGuard</span>
      </a>
      <a href="/" class="btn btn-sm btn-outline">Torna al sito</a>
    </div>
  </header>

  <main class="wrap" style="padding:40px 24px 80px; max-width:800px">
    <!-- Login -->
    <div id="login" class="card" style="max-width:360px; margin:40px auto">
      <h2 style="font-family:'Instrument Serif',serif; font-size:28px; margin-bottom:8px">Admin</h2>
      <p style="color:var(--text-muted); margin-bottom:32px; font-size:15px">Accedi per gestire i contenuti.</p>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="user" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="pass" required>
        </div>
        <p id="err" style="color:#dc2626; font-size:14px; margin-bottom:16px"></p>
        <button class="btn" style="width:100%">Accedi</button>
      </form>
    </div>

    <!-- Panel -->
    <div id="panel" style="display:none">
      <div style="display:flex; gap:8px; margin-bottom:40px; flex-wrap:wrap">
        <button class="btn btn-sm btn-outline active" data-tab="news">News</button>
        <button class="btn btn-sm btn-outline" data-tab="team">Team</button>
        <button class="btn btn-sm btn-outline" data-tab="settings">Impostazioni</button>
        <button class="btn btn-sm btn-outline" id="logout-btn" style="margin-left:auto">Logout</button>
      </div>

      <!-- News Tab -->
      <div id="tab-news">
        <div style="display:grid; grid-template-columns:1.2fr 1fr; gap:32px">
          <div>
            <h3 style="font-size:20px; margin-bottom:24px" id="form-title">Nuova news</h3>
            <form id="news-form">
              <input type="hidden" id="nid">
              <div class="form-group">
                <label class="form-label">Titolo</label>
                <input type="text" class="form-input" id="nt" required>
              </div>
              <div class="form-group">
                <label class="form-label">Contenuto</label>
                <textarea class="form-input" id="nc" rows="5" required></textarea>
              </div>
              <button class="btn btn-sm" id="nbtn">Pubblica</button>
              <button type="button" class="btn btn-sm btn-outline" id="ncancel" style="display:none;margin-left:8px">Annulla</button>
            </form>
          </div>
          <div id="nlist"></div>
        </div>
      </div>

      <!-- Team Tab -->
      <div id="tab-team" style="display:none">
        <div style="display:grid; grid-template-columns:1.2fr 1fr; gap:32px">
          <div>
            <h3 style="font-size:20px; margin-bottom:24px" id="tform-title">Nuovo membro</h3>
            <form id="team-form">
              <input type="hidden" id="tid">
              <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" class="form-input" id="tn" required>
              </div>
              <div class="form-group">
                <label class="form-label">Ruolo</label>
                <input type="text" class="form-input" id="tr" required>
              </div>
              <div class="form-group">
                <label class="form-label">Iniziali</label>
                <input type="text" class="form-input" id="ti" maxlength="2" style="width:80px">
              </div>
              <button class="btn btn-sm" id="tbtn">Aggiungi</button>
              <button type="button" class="btn btn-sm btn-outline" id="tcancel" style="display:none;margin-left:8px">Annulla</button>
            </form>
          </div>
          <div id="tlist"></div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div id="tab-settings" style="display:none">
        <div class="card" style="max-width:400px">
          <h3 style="font-size:20px; margin-bottom:24px">Impostazioni</h3>
          <form id="set-form">
            <div class="form-group">
              <label class="form-label">Titolo sito</label>
              <input type="text" class="form-input" id="st">
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="se">
            </div>
            <button class="btn btn-sm">Salva</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script>
    const $ = s => document.querySelector(s)
    const esc = s => { const e = document.createElement('div'); e.textContent = s; return e.innerHTML }
    const api = (u, o = {}) => fetch(u, o).then(r => r.ok ? r.json() : Promise.reject(r))

    // Login
    $('#login-form').onsubmit = async e => {
      e.preventDefault()
      try {
        const d = await api('/api/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: $('#user').value, password: $('#pass').value }) })
        if (d.ok) { $('#login').style.display = 'none'; $('#panel').style.display = 'block'; load() }
      } catch { $('#err').textContent = 'Credenziali errate' }
    }

    $('#logout-btn').onclick = async () => { await api('/api/logout', { method: 'POST' }); location.reload() }

    // Tabs
    $$('[data-tab]').forEach(b => b.onclick = () => {
      $$('[data-tab]').forEach(x => x.classList.remove('active'))
      b.classList.add('active')
      $$('[id^="tab-"]').forEach(t => t.style.display = 'none')
      $('#tab-' + b.dataset.tab).style.display = 'block'
    })

    async function load() {
      const [news, team, set] = await Promise.all([
        api('/api/news'),
        api('/api/team'),
        api('/api/admin/settings')
      ])

      $('#nlist').innerHTML = news.map(n => `
        <div style="padding:12px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:8px">
          <div>
            <div style="font-size:14px; font-weight:500">${esc(n.title)}</div>
            <div style="font-size:12px; color:var(--text-muted)">${new Date(n.created_at).toLocaleDateString('it-IT')}</div>
          </div>
          <div style="display:flex; gap:4px">
            <button class="btn btn-sm btn-outline" onclick="editNews(${n.id})">Modifica</button>
            <button class="btn btn-sm btn-danger" onclick="del('news',${n.id})">×</button>
          </div>
        </div>
      `).join('') || '<p style="color:var(--text-muted); font-size:14px">Nessuna news</p>'

      $('#tlist').innerHTML = team.map(t => `
        <div style="padding:12px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:8px">
          <div>
            <div style="font-size:14px; font-weight:500">${esc(t.name)}</div>
            <div style="font-size:12px; color:var(--text-muted)">${esc(t.role)}</div>
          </div>
          <div style="display:flex; gap:4px">
            <button class="btn btn-sm btn-outline" onclick="editTeam(${t.id})">Modifica</button>
            <button class="btn btn-sm btn-danger" onclick="del('team',${t.id})">×</button>
          </div>
        </div>
      `).join('') || '<p style="color:var(--text-muted); font-size:14px">Nessun membro</p>'

      $('#st').value = set.site_title || ''
      $('#se').value = set.contact_email || ''
    }

    // News CRUD
    $('#news-form').onsubmit = async e => {
      e.preventDefault()
      const id = $('#nid').value
      const d = { title: $('#nt').value, content: $('#nc').value }
      await api(id ? `/api/admin/news/${id}` : '/api/admin/news', { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(d) })
      resetNews(); load()
    }

    window.editNews = async id => {
      const news = await api('/api/news')
      const n = news.find(x => x.id === id)
      const full = await api(`/api/news/${id}`)
      $('#nid').value = id
      $('#nt').value = n.title
      $('#nc').value = full.content
      $('#form-title').textContent = 'Modifica news'
      $('#nbtn').textContent = 'Salva'
      $('#ncancel').style.display = 'inline'
    }

    const resetNews = () => {
      $('#nid').value = ''
      $('#nt').value = ''
      $('#nc').value = ''
      $('#form-title').textContent = 'Nuova news'
      $('#nbtn').textContent = 'Pubblica'
      $('#ncancel').style.display = 'none'
    }
    $('#ncancel').onclick = resetNews

    // Team CRUD
    $('#team-form').onsubmit = async e => {
      e.preventDefault()
      const id = $('#tid').value
      const d = { name: $('#tn').value, role: $('#tr').value, initials: $('#ti').value }
      await api(id ? `/api/admin/team/${id}` : '/api/admin/team', { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(d) })
      resetTeam(); load()
    }

    window.editTeam = async id => {
      const team = await api('/api/team')
      const t = team.find(x => x.id === id)
      $('#tid').value = id
      $('#tn').value = t.name
      $('#tr').value = t.role
      $('#ti').value = t.initials || ''
      $('#tform-title').textContent = 'Modifica membro'
      $('#tbtn').textContent = 'Salva'
      $('#tcancel').style.display = 'inline'
    }

    const resetTeam = () => {
      $('#tid').value = ''
      $('#tn').value = ''
      $('#tr').value = ''
      $('#ti').value = ''
      $('#tform-title').textContent = 'Nuovo membro'
      $('#tbtn').textContent = 'Aggiungi'
      $('#tcancel').style.display = 'none'
    }
    $('#tcancel').onclick = resetTeam

    // Delete
    window.del = async (type, id) => {
      if (!confirm('Eliminare?')) return
      await api(`/api/admin/${type}/${id}`, { method: 'DELETE' })
      load()
    }

    // Settings
    $('#set-form').onsubmit = async e => {
      e.preventDefault()
      await api('/api/admin/settings', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ site_title: $('#st').value, contact_email: $('#se').value }) })
      alert('Salvato!')
    }

    // Check auth
    async function check() {
      const d = await api('/api/auth/check')
      if (d.loggedIn) { $('#login').style.display = 'none'; $('#panel').style.display = 'block'; load() }
    }
    check()
  </script>
</body>
</html>
