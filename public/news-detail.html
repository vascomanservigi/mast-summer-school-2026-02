<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News - CyberGuard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="container">
        <div class="header-top-inner">
          <span>Piattaforma di Cybersecurity</span>
          <div class="header-top-links">
            <a href="#contatti">Contatti</a>
            <a href="/admin">Area riservata</a>
          </div>
        </div>
      </div>
    </div>
    <div class="header-main">
      <div class="container header-main-inner">
        <a href="/" class="site-logo">
          <div class="logo-mark"><i data-lucide="shield-check"></i></div>
          <div class="logo-text">
            <span class="logo-title">CyberGuard</span>
            <span class="logo-subtitle">Cybersecurity per tutti</span>
          </div>
        </a>
        <nav class="main-nav" id="main-nav">
          <a href="/#chi-siamo">Chi siamo</a>
          <a href="/#progetto">Il progetto</a>
          <a href="/#funzionalita">Funzionalità</a>
          <a href="/#news">News</a>
          <a href="/#team">Team</a>
        </nav>
        <button class="nav-toggle" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <div class="breadcrumb">
    <div class="container">
      <span>Ti trovi in:</span>
      <a href="/">Home</a>
      <span>/</span>
      <a href="/#news">News</a>
      <span id="breadcrumb-title"></span>
    </div>
  </div>

  <main class="section">
    <div class="container">
      <article class="article">
        <header class="article-header">
          <div class="article-date" id="article-date"></div>
          <h1 class="article-title" id="article-title"></h1>
        </header>
        <div class="article-content" id="article-content"></div>
      </article>
      <div class="article-footer">
        <a href="/#news" class="btn btn-outline">← Torna alle news</a>
      </div>
    </div>
  </main>

  <footer class="site-footer" style="padding:1.5rem 0">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0">
        <p>© 2026 CyberGuard - MAST Summer School 2026</p>
      </div>
    </div>
  </footer>

  <style>
    .article { max-width: 800px; margin: 0 auto; }
    .article-header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--gray-200); }
    .article-date { font-size: 0.85rem; color: var(--primary); font-weight: 600; margin-bottom: 0.75rem; }
    .article-title { font-size: 2rem; font-weight: 700; color: var(--gray-900); line-height: 1.3; }
    .article-content { font-size: 1.05rem; line-height: 1.8; color: var(--gray-600); }
    .article-content p { margin-bottom: 1.5rem; }
    .article-footer { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200); }
    .article-error { text-align: center; padding: 3rem; }
    .article-error h2 { color: var(--gray-900); margin-bottom: 0.5rem; }
    .article-error p { color: var(--gray-500); margin-bottom: 1.5rem; }
  </style>

  <script>
    async function loadNews() {
      const id = window.location.pathname.split('/').pop()
      const titleEl = document.getElementById('article-title')
      const dateEl = document.getElementById('article-date')
      const contentEl = document.getElementById('article-content')
      const breadcrumbEl = document.getElementById('breadcrumb-title')

      try {
        const res = await fetch(`/api/news/${id}`)
        if (!res.ok) throw new Error('Not found')
        const news = await res.json()

        document.title = `${news.title} - CyberGuard`
        titleEl.textContent = news.title
        breadcrumbEl.textContent = ` / ${news.title.substring(0, 30)}${news.title.length > 30 ? '...' : ''}`
        dateEl.textContent = new Date(news.created_at).toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
        contentEl.innerHTML = news.content.split('\n').filter(p => p.trim()).map(p => `<p>${escapeHtml(p)}</p>`).join('')
        lucide.createIcons()
      } catch {
        document.title = 'News non trovata - CyberGuard'
        titleEl.textContent = 'News non trovata'
        contentEl.innerHTML = '<div class="article-error"><p>La news richiesta non esiste o è stata rimossa.</p><a href="/#news" class="btn btn-primary">Torna alle news</a></div>'
      }
    }

    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML }

    document.addEventListener('DOMContentLoaded', loadNews)
    document.querySelector('.nav-toggle').addEventListener('click', () => document.getElementById('main-nav').classList.toggle('open'))
  </script>
</body>
</html>
