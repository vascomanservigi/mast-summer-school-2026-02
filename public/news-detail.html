<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News - CyberGuard</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <div class="logo-icon"><i data-lucide="shield-check"></i></div>
        <span>CyberGuard</span>
      </a>
      <nav class="nav" id="nav">
        <a href="/#chi-siamo" class="nav-link">Chi siamo</a>
        <a href="/#progetto" class="nav-link">Il progetto</a>
        <a href="/#funzionalita" class="nav-link">Funzionalità</a>
        <a href="/#news" class="nav-link">News</a>
        <a href="/#team" class="nav-link">Team</a>
        <a href="/admin" class="nav-link nav-admin"><i data-lucide="lock"></i> Admin</a>
      </nav>
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <article class="article">
    <div class="container">
      <div class="article-header">
        <a href="/#news" class="article-back"><i data-lucide="arrow-left"></i> Torna alle news</a>
        <div class="article-meta">
          <div class="article-date" id="article-date"></div>
        </div>
        <h1 class="article-title" id="article-title"></h1>
      </div>
      <div class="article-content" id="article-content"></div>
    </div>
  </article>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0">
        <p>© 2026 CyberGuard — MAST Summer School 2026, Track Cyberworld</p>
      </div>
    </div>
  </footer>

  <style>
    .article { padding: 6rem 0; min-height: 60vh; }
    .article-header { max-width: 800px; margin: 0 auto 3rem; }
    .article-back {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--blue-600); text-decoration: none;
      font-size: 0.95rem; font-weight: 500;
      margin-bottom: 2rem;
      padding: 0.5rem 1rem;
      background: var(--blue-50);
      border-radius: var(--radius-sm);
      transition: all .2s;
    }
    .article-back:hover { background: var(--blue-100); }
    .article-back svg { width: 18px; height: 18px; }
    .article-meta { margin-bottom: 1rem; }
    .article-date {
      display: inline-block;
      font-size: 0.85rem; color: var(--blue-600);
      background: var(--blue-50);
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      font-weight: 500;
    }
    .article-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800; color: var(--gray-900);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .article-content {
      max-width: 800px;
      margin: 0 auto;
      font-size: 1.15rem; line-height: 1.9;
      color: var(--gray-600);
    }
    .article-content p { margin-bottom: 1.75rem; }
    .article-content p:last-child { margin-bottom: 0; }
    .article-error {
      text-align: center; padding: 4rem 2rem;
      background: var(--gray-50);
      border-radius: var(--radius-lg);
    }
    .article-error h2 { color: var(--gray-900); margin-bottom: 0.5rem; }
    .article-error p { color: var(--gray-500); margin-bottom: 1.5rem; }
  </style>

  <script>
    async function loadNews() {
      const id = window.location.pathname.split('/').pop()
      const titleEl = document.getElementById('article-title')
      const dateEl = document.getElementById('article-date')
      const contentEl = document.getElementById('article-content')

      try {
        const res = await fetch(`/api/news/${id}`)
        if (!res.ok) throw new Error('Not found')
        const news = await res.json()

        document.title = `${news.title} - CyberGuard`
        titleEl.textContent = news.title
        dateEl.textContent = new Date(news.created_at).toLocaleDateString('it-IT', {
          weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        })
        contentEl.innerHTML = news.content.split('\n').filter(p => p.trim()).map(p => `<p>${escapeHtml(p)}</p>`).join('')
        lucide.createIcons()
      } catch (err) {
        document.title = 'News non trovata - CyberGuard'
        titleEl.textContent = 'News non trovata'
        contentEl.innerHTML = `
          <div class="article-error">
            <p>La news che cerchi non esiste o è stata rimossa.</p>
            <a href="/#news" class="btn btn-primary">Torna alle news</a>
          </div>
        `
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    document.addEventListener('DOMContentLoaded', loadNews)
    document.querySelector('.nav-toggle').addEventListener('click', () => {
      document.getElementById('nav').classList.toggle('open')
    })
  </script>
</body>
</html>
