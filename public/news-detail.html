<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — CyberGuard</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="wrap header-inner">
      <a href="/" class="logo">
        <div class="logo-icon"></div>
        <span>CyberGuard</span>
      </a>
      <a href="/#news" class="btn btn-sm btn-outline">Torna alle news</a>
    </div>
  </header>

  <article class="wrap" style="padding:120px 24px 80px; max-width:640px">
    <p class="news-date" id="date" style="margin-bottom:16px"></p>
    <h1 id="title" style="font-family:'Instrument Serif',serif; font-size:36px; font-weight:400; line-height:1.2; margin-bottom:32px"></h1>
    <div id="content" style="color:var(--text-muted); line-height:1.8"></div>
  </article>

  <script>
    async function load() {
      const id = location.pathname.split('/').pop()
      try {
        const n = await (await fetch(`/api/news/${id}`)).json()
        document.title = n.title + ' — CyberGuard'
        date.textContent = new Date(n.created_at).toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
        title.textContent = n.title
        content.innerHTML = n.content.split('\n').filter(p => p.trim()).map(p => `<p style="margin-bottom:1.5em">${p}</p>`).join('')
      } catch {
        title.textContent = 'News non trovata'
      }
    }
    load()
  </script>
</body>
</html>
